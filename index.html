<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aero-Exchange: Professional L2 Order Book — AAPL Simulated Feed">
    <title>Aero-Exchange | AAPL L2 Market Depth</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-0: #07090f;
            --bg-1: #0d1117;
            --bg-2: #161b22;
            --bg-3: #1c2230;
            --bg-hover: rgba(255,255,255,0.04);
            --border: #21262d;
            --border-muted: #30363d;

            --text-0: #e6edf3;
            --text-1: #8b949e;
            --text-2: #656d76;

            --bid: #3fb950;
            --bid-bg: rgba(63,185,80,0.12);
            --bid-dim: rgba(63,185,80,0.06);
            --ask: #f85149;
            --ask-bg: rgba(248,81,73,0.12);
            --ask-dim: rgba(248,81,73,0.06);
            --accent: #58a6ff;
            --accent-bg: rgba(88,166,255,0.1);
            --warn: #d29922;

            --mono: 'Fira Code', 'Cascadia Code', monospace;
            --sans: 'Inter', system-ui, sans-serif;
            --r: 4px;
        }

        html, body {
            background: var(--bg-0);
            color: var(--text-0);
            font-family: var(--sans);
            height: 100vh;
            overflow: hidden;
        }

        /* ===== HEADER ===== */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            background: var(--bg-1);
            border-bottom: 1px solid var(--border);
            height: 48px;
            flex-shrink: 0;
            gap: 16px;
        }

        .dashboard-header h1 {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-0);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .market-stats {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: nowrap;
            overflow: hidden;
        }

        .stat {
            display: flex;
            flex-direction: column;
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 600;
            line-height: 1.2;
            white-space: nowrap;
        }

        .stat-label {
            font-family: var(--sans);
            font-size: 9px;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 500;
        }

        .stat.bb { color: var(--bid); }
        .stat.ba { color: var(--ask); }
        .stat.mid { color: var(--accent); }

        /* ===== LAYOUT ===== */
        .dashboard {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 260px 1fr 360px;
            gap: 1px;
            padding: 1px;
            flex: 1;
            background: var(--border);
            min-height: 0;
        }

        .left-col, .mid-col, .right-col {
            display: flex;
            flex-direction: column;
            background: var(--bg-0);
            min-height: 0;
            gap: 1px;
        }

        /* ===== PANEL ===== */
        .panel {
            background: var(--bg-1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .panel-header {
            padding: 6px 10px;
            background: var(--bg-2);
            border-bottom: 1px solid var(--border);
            font-size: 10px;
            font-weight: 600;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .panel-header .ph-badge {
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 2px;
            background: var(--bg-3);
            color: var(--text-2);
            letter-spacing: 0.5px;
        }

        /* ===== CONTROLS ===== */
        .controls {
            flex-shrink: 0;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            padding: 8px;
        }

        button {
            background: var(--bg-3);
            color: var(--text-0);
            border: 1px solid var(--border-muted);
            padding: 6px 8px;
            border-radius: var(--r);
            cursor: pointer;
            font-family: var(--sans);
            font-size: 11px;
            font-weight: 600;
            transition: all 0.1s;
            white-space: nowrap;
            text-align: center;
        }

        button:hover { background: var(--border-muted); border-color: var(--text-2); }
        button.active { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }
        button.btn-buy { color: var(--bid); border-color: rgba(63,185,80,0.4); background: rgba(63,185,80,0.08); }
        button.btn-buy:hover { background: rgba(63,185,80,0.18); }
        button.btn-sell { color: var(--ask); border-color: rgba(248,81,73,0.4); background: rgba(248,81,73,0.08); }
        button.btn-sell:hover { background: rgba(248,81,73,0.18); }
        button.btn-pause { color: var(--warn); border-color: rgba(210,153,34,0.4); background: rgba(210,153,34,0.08); }
        button.btn-pause:hover { background: rgba(210,153,34,0.18); }

        /* ===== CLI ===== */
        .order-entry-cli {
            flex-shrink: 0;
        }

        .cli-log {
            padding: 4px 8px;
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text-1);
            max-height: 60px;
            overflow-y: auto;
            display: flex;
            flex-direction: column-reverse;
            background: #000;
            border-bottom: 1px solid var(--border);
        }

        .cli-log div { padding: 1px 0; }
        .cli-log div:contains("ACK") { color: var(--bid); }
        .cli-log div:contains("ERR") { color: var(--ask); }

        .cli-input {
            background: #000;
            color: var(--accent);
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 8px 10px;
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 600;
            width: 100%;
            outline: none;
        }

        .cli-input::placeholder { color: var(--text-2); font-weight: 400; }
        .cli-input:focus { background: #050d1a; }

        /* ===== TRADE TAPE ===== */
        .trade-tape { flex: 1; overflow-y: auto; font-family: var(--mono); font-size: 11px; min-height: 0; }

        .tape-col-header {
            display: grid;
            grid-template-columns: 55px 1fr 50px 45px;
            padding: 4px 8px;
            border-bottom: 1px solid var(--border);
            font-size: 9px;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            background: var(--bg-2);
            flex-shrink: 0;
        }

        .trade-row {
            display: grid;
            grid-template-columns: 55px 1fr 50px 45px;
            padding: 2px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            align-items: center;
            animation: flashNew 0.4s ease-out;
        }

        @keyframes flashNew {
            0% { background: rgba(255,255,255,0.08); }
            100% { background: transparent; }
        }

        .trade-row:hover { background: var(--bg-hover); }
        .trade-time { color: var(--text-2); font-size: 10px; }
        .trade-price { font-weight: 600; text-align: right; }
        .trade-qty { color: var(--text-1); text-align: right; }
        .trade-side { text-align: right; font-size: 9px; font-weight: 700; letter-spacing: 0.5px; }
        .trade-price.buy, .trade-side.buy { color: var(--bid); }
        .trade-price.sell, .trade-side.sell { color: var(--ask); }

        /* ===== PRICE CHART ===== */
        .chart-panel { flex: 1.8; min-height: 0; }

        .price-chart-svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .chart-wrapper {
            flex: 1;
            display: flex;
            position: relative;
            min-height: 0;
        }

        /* Y-axis label strip */
        .chart-y-axis {
            width: 50px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 8px 4px 20px 4px;
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text-2);
            text-align: right;
            border-right: 1px solid var(--border);
            background: var(--bg-2);
        }

        .chart-y-label { line-height: 1; }

        /* ===== MARKET DEPTH VISUAL ===== */
        .depth-visual-panel { flex: 1; min-height: 0; }

        .depth-visual-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            position: relative;
        }

        .depth-vis-chart-area {
            flex: 1;
            display: flex;
            align-items: flex-end;
            padding: 8px 8px 24px 8px;
            gap: 1px;
            min-height: 0;
        }

        .depth-vis-half {
            display: flex;
            align-items: flex-end;
            flex: 1;
            height: 100%;
            gap: 1px;
        }

        .depth-vis-left { justify-content: flex-end; }
        .depth-vis-right { justify-content: flex-start; }

        .depth-vis-bar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            height: 100%;
            flex: 1;
            min-width: 6px;
        }

        .depth-vis-bar-fill {
            width: 100%;
            min-height: 2px;
            transition: height 0.2s ease-out;
            border-radius: 1px 1px 0 0;
        }

        .depth-vis-bar-fill.bid { background: var(--bid); }
        .depth-vis-bar-fill.ask { background: var(--ask); }

        .depth-axis-bar {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            top: 8px;
            background: var(--border-muted);
            pointer-events: none;
        }

        .depth-vis-x-axis {
            position: absolute;
            bottom: 0;
            left: 0; right: 0;
            height: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8px;
            font-family: var(--mono);
            font-size: 9px;
            color: var(--text-2);
            border-top: 1px solid var(--border);
        }

        .depth-vis-x-axis .label-bid { color: var(--bid); }
        .depth-vis-x-axis .label-ask { color: var(--ask); }
        .depth-vis-x-axis .label-mid { color: var(--text-2); }

        .depth-vis-y-axis {
            position: absolute;
            left: 0; top: 8px; bottom: 24px;
            width: 36px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 0 2px;
            font-family: var(--mono);
            font-size: 8px;
            color: var(--text-2);
            text-align: right;
        }

        /* ===== ORDER BOOK ===== */
        .right-col { min-width: 0; }

        .book-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: var(--mono);
            font-size: 12px;
            min-height: 0;
        }

        .split-book-body {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }

        .bids-side, .asks-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        .asks-side { border-left: 1px solid var(--border); }

        .book-col-header {
            display: flex;
            padding: 5px 8px;
            border-bottom: 1px solid var(--border);
            color: var(--text-2);
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            background: var(--bg-2);
            flex-shrink: 0;
        }

        .book-col-header span { flex: 1; }
        .bids-side .book-col-header .col-vol { text-align: left; }
        .bids-side .book-col-header .col-price { text-align: right; }
        .asks-side .book-col-header .col-price { text-align: left; }
        .asks-side .book-col-header .col-vol { text-align: right; }

        .asks-container, .bids-container {
            flex: 1;
            overflow-y: hidden;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .asks-container { justify-content: flex-end; }

        .depth-row {
            display: flex;
            position: relative;
            padding: 2px 8px;
            height: 20px;
            align-items: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .depth-row:hover { background: var(--bg-hover); }

        .depth-bar {
            position: absolute;
            top: 0; bottom: 0;
            z-index: 1;
            transition: width 0.15s ease;
        }

        .bar-ask { right: 0; background: var(--ask-bg); }
        .bar-bid { left: 0; background: var(--bid-bg); }

        .price, .qty {
            z-index: 2;
            flex: 1;
            position: relative;
            white-space: nowrap;
            overflow: hidden;
        }

        .bids-side .depth-row { flex-direction: row-reverse; }
        .bids-side .price { text-align: right; color: var(--bid); font-weight: 600; }
        .bids-side .qty { text-align: left; color: var(--text-1); }
        .asks-side .price { text-align: left; color: var(--ask); font-weight: 600; }
        .asks-side .qty { text-align: right; color: var(--text-1); }

        .spread-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 8px;
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            background: var(--accent-bg);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .spread-row .spread-label { font-size: 9px; color: var(--text-2); font-family: var(--sans); text-transform: uppercase; letter-spacing: 0.8px; }
        .spread-row .spread-pct { font-size: 10px; color: var(--text-1); }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-0); }
        ::-webkit-scrollbar-thumb { background: var(--border-muted); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-2); }
    </style>
</head>
<body>
    <div id="app" role="main" aria-label="Aero Exchange Trading Dashboard"></div>
    <script src="_build/default/web/app.bc.js"></script>
</body>
</html>
